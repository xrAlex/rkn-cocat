# Общие DNS-наборы для тестов.

local_resolvers:
  - ip: '192.168.1.1'
    name: 'Router DNS 192.168.1.1'

udp_servers:
  - ip: '8.8.8.8'
    name: 'Google'
  - ip: '1.1.1.1'
    name: 'Cloudflare'
  - ip: '223.5.5.5'
    name: 'Ali DNS'
  - ip: '194.140.14.14'
    name: 'AdGuard'

# Единый список DoH endpoints для DNS EDE и DNS transport matrix.
doh_servers:
  - url: 'https://dns.google/dns-query'
    name: 'Google'
  - url: 'https://dns.cloudflare.com/dns-query'
    name: 'Cloudflare'
  - url: 'https://dns.alidns.com/dns-query'
    name: 'Ali DNS'
  - url: 'https://dns.adguard-dns.com/dns-query'
    name: 'AdGuard'

# Единый список DoT endpoints для DNS EDE и DNS transport matrix.
dot_servers:
  - address: '1.1.1.1:853'
    name: 'Cloudflare'
    server_name: 'one.one.one.one'
  - address: '8.8.8.8:853'
    name: 'Google'
    server_name: 'dns.google'
  - address: '223.5.5.5:853'
    name: 'Ali DNS'
    server_name: 'dns.alidns.com'
  - address: '94.140.14.14:853'
    name: 'AdGuard'
    server_name: 'dns.adguard-dns.com'
